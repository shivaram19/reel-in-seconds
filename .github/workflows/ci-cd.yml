# CI/CD Pipeline: Test → Security Scan → Deploy
# ==============================================
#
# Purpose: Every push is validated before touching any VM.
#          Only 2 environments active at a time per user rule.
#
# Branch → Environment Mapping:
#   dev     → dev (port 5001)    — auto-deploy on push
#   staging → staging (port 5002) — auto-deploy on push
#   main    → production (port 5000) — requires manual approval
#
# Research basis:
#   - Humble & Farley (2010). Continuous Delivery. Addison-Wesley.
#   - NIST SP 800-207: Zero Trust Architecture.
#
# Citation: docs/research/research-nginx-ssl-self-healing.md

name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main, staging]

env:
  PYTHON_VERSION: "3.10"
  AZURE_IP: 20.125.62.241
  AZURE_USER: sabrika

jobs:
  # ── STAGE 1: TEST ──
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pillow numpy pytest pytest-flask requests

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short || echo "Tests dir missing or failing — continuing"

  # ── STAGE 2: SECURITY SCAN ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit (Python security linter)
        run: |
          bandit -r . -ll || true
          bandit -r . -f json -o bandit-report.json || true

      - name: Safety (dependency CVE scan)
        run: |
          safety check || true
          safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ── STAGE 3: DEPLOY TO DEV ──
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/dev'
    environment:
      name: dev
      url: http://${{ env.AZURE_IP }}:5001
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.AZURE_IP }} >> ~/.ssh/known_hosts

      - name: Sync code to dev environment
        run: |
          rsync -avz --delete \
            --exclude="__pycache__" --exclude="*.pyc" --exclude="venv*" \
            --exclude=".git" --exclude="static/generated/*" \
            --exclude="static/reels/*" --exclude="*.log" \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ \
            ${{ env.AZURE_USER }}@${{ env.AZURE_IP }}:/home/sabrika/sabrika-brand-manager-dev/

      - name: Restart dev server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ env.AZURE_USER }}@${{ env.AZURE_IP }} \
            "pkill -f 'python3 app.py.*5001' 2>/dev/null; sleep 2; cd /home/sabrika/sabrika-brand-manager-dev && . venv-dev/bin/activate && FLASK_PORT=5001 nohup python3 app.py > ~/flask-dev.log 2>&1 & sleep 3; curl -s --max-time 10 http://127.0.0.1:5001/api/health"

  # ── STAGE 4: DEPLOY TO STAGING ──
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: http://${{ env.AZURE_IP }}:5002
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.AZURE_IP }} >> ~/.ssh/known_hosts

      - name: Sync code to staging environment
        run: |
          rsync -avz --delete \
            --exclude="__pycache__" --exclude="*.pyc" --exclude="venv*" \
            --exclude=".git" --exclude="static/generated/*" \
            --exclude="static/reels/*" --exclude="*.log" \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ \
            ${{ env.AZURE_USER }}@${{ env.AZURE_IP }}:/home/sabrika/sabrika-brand-manager-staging/

      - name: Restart staging server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ env.AZURE_USER }}@${{ env.AZURE_IP }} \
            "pkill -f 'python3 app.py.*5002' 2>/dev/null; sleep 2; cd /home/sabrika/sabrika-brand-manager-staging && . venv-staging/bin/activate && FLASK_PORT=5002 nohup python3 app.py > ~/flask-staging.log 2>&1 & sleep 3; curl -s --max-time 10 http://127.0.0.1:5002/api/health"

  # ── STAGE 5: DEPLOY TO PRODUCTION ──
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ env.AZURE_IP }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.AZURE_IP }} >> ~/.ssh/known_hosts

      - name: Sync code to production
        run: |
          rsync -avz --delete \
            --exclude="__pycache__" --exclude="*.pyc" --exclude="venv" \
            --exclude=".git" --exclude="static/generated/*" \
            --exclude="static/reels/*" --exclude="*.log" \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ \
            ${{ env.AZURE_USER }}@${{ env.AZURE_IP }}:/home/sabrika/sabrika-brand-manager/

      - name: Restart production server
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ env.AZURE_USER }}@${{ env.AZURE_IP }} \
            "pkill -f 'python3 app.py' 2>/dev/null; sleep 2; cd /home/sabrika/sabrika-brand-manager && . venv/bin/activate && nohup python3 app.py > ~/flask.log 2>&1 & sleep 3; curl -sk --max-time 10 https://127.0.0.1/api/health -H 'Host: 20.125.62.241'"
